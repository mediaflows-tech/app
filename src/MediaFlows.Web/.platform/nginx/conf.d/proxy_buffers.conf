# Increase proxy buffer sizes for large OIDC authentication cookies
# The default 4k/8k is too small for JWT tokens in Set-Cookie headers
proxy_buffer_size 16k;
proxy_buffers 4 16k;
proxy_busy_buffers_size 16k;

# Also increase header buffer for large query strings (OIDC state)
large_client_header_buffers 4 16k;
