# .github/workflows/terraform-apply.yml
name: Terraform Apply

on:
  # Automatic push trigger suppressed for the public release. Restore the
  # block below to re-enable CI applies on infrastructure changes.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'infrastructure/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write # OIDC JWT token
  contents: read # Checkout

concurrency:
  group: terraform-apply
  cancel-in-progress: false # Never cancel in-progress applies

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    # No TF_VAR_* env vars — the main stack reads secrets from SSM.

    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.0'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -backend-config=bootstrap/backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=environments/prod.tfvars -no-color -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Output
        run: terraform output -no-color
